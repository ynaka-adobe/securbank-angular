@if (data && categories[selectedVariation]) {
  <div class="home-page">
    <div class="selector-buttons">
      @for (item of categories | keyvalue; track item.key) {
        <app-selector-button
          [isSelected]="selectedVariation === item.key"
          (onClick)="selectVariation(item.key)">
          {{ item.value }}
        </app-selector-button>
      }
    </div>
    <aem-embed url="https://main--embed-example--aemsites.aem.page/banners/banner1"></aem-embed>
    @if (featuredServices && featuredServices.length) {
      <app-teaser-section [title]="'Featured Services'" [cfs]="featuredServices"></app-teaser-section>
    }
    <app-call-to-action-section></app-call-to-action-section>
  </div>
}
