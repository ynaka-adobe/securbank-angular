@if (data) {
  <section class="service-detail">
    @if (image) {
      <app-image [src]="image" alt="" prop="icon"></app-image>
    }
    @if (category) {
      <span class="category">{{ category }}</span>
    }
    <app-title heading="h1" prop="title">{{ title }}</app-title>
    @if (content) {
      <app-text [content]="content" prop="description"></app-text>
    }
    <app-redirect-button href="/">Book Now</app-redirect-button>
  </section>
}
