<app-content-fragment [cf]="cf">
  <div class="teaser-card card-vertical">
    @if (image) {
      <app-image [src]="image" alt="" prop="icon"></app-image>
    }
    <app-title heading="h3" prop="title">{{ title }}</app-title>
    @if (content) {
      <app-text [content]="content" prop="description"></app-text>
    }
    <app-redirect-button [href]="path">Learn More</app-redirect-button>
  </div>
</app-content-fragment>
