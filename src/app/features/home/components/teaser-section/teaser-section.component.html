@if (cfs && cfs.length) {
  <section class="teaser-section">
    @if (title) {
      <h2>{{ title }}</h2>
    }
    <app-container className="teaser-grid">
      @for (teaser of cfs; track $index) {
        <app-teaser-card [cf]="$any(teaser)" [index]="$index"></app-teaser-card>
      }
    </app-container>
  </section>
}
